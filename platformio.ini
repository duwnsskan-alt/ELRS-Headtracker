[env:xiao_esp32c6]
platform     = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board        = seeed_xiao_esp32c6
framework    = arduino
board_dir    = boards

; ── 빌드 옵션 ──────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=3            ; INFO 레벨 로그 (0=없음, 5=상세)
    -DCONFIG_ARDUHAL_LOG_COLORS=1   ; 컬러 로그
    -I include                      ; IPv6Address.h compat stub

; ── 시리얼 ─────────────────────────────────────────────
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder, colorize

; ── 라이브러리 ──────────────────────────────────────────
lib_deps =
    ; BNO085 센서 퓨전
    adafruit/Adafruit BNO08x@^1.2.3
    adafruit/Adafruit BusIO@^1.14.0
    ; XIAO C6 내장 RGB LED (WS2812)
    adafruit/Adafruit NeoPixel@^1.12.0
    ; WebUI — AsyncWebServer + JSON
    esphome/ESPAsyncWebServer-esphome@^3.3.0
    bblanchon/ArduinoJson@^7.2.0
    ; NVS / ESP-NOW — ESP-IDF 내장, 별도 불필요

; ── 파티션 (NVS 공간 확보) ─────────────────────────────
board_build.partitions = partitions.csv

; ── 업로드 ─────────────────────────────────────────────
upload_speed = 921600

; ─── 개발 편의: 시리얼 모니터 자동 리셋 ───────────────
monitor_dtr = 0
monitor_rts = 0

; ══════════════════════════════════════════════════════
; 테스트 환경: ESP32-C3 SuperMini
;   - 내장 WS2812 없음 → GPIO3에 외부 NeoPixel 연결
;   - BOOT 버튼: GPIO9  /  MODE 버튼: GPIO10
;   - I2C(BNO085): SDA=GPIO6, SCL=GPIO7  (XIAO와 동일)
;   - SBUS TX: GPIO4 (UART1)
; ══════════════════════════════════════════════════════
[env:esp32c3_supermini]
platform     = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board        = esp32c3_supermini
framework    = arduino
board_dir    = boards

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    -I include
    -DBOARD_ESP32C3_SUPERMINI          ; 보드 분기 플래그

monitor_speed  = 115200
monitor_filters = esp32_exception_decoder, colorize

lib_deps =
    adafruit/Adafruit BNO08x@^1.2.3
    adafruit/Adafruit BusIO@^1.14.0
    adafruit/Adafruit NeoPixel@^1.12.0
    esphome/ESPAsyncWebServer-esphome@^3.3.0
    bblanchon/ArduinoJson@^7.2.0

board_build.partitions = partitions.csv

upload_speed = 460800

monitor_dtr = 0
monitor_rts = 0
