[env:xiao_esp32c6]
platform  = espressif32
board     = seeed_xiao_esp32c6
framework = arduino

; ── 빌드 옵션 ──────────────────────────────────────────
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1     ; USB Serial 활성화 (디버그용)
    -DCORE_DEBUG_LEVEL=3            ; INFO 레벨 로그 (0=없음, 5=상세)
    -DCONFIG_ARDUHAL_LOG_COLORS=1   ; 컬러 로그

; ── 시리얼 ─────────────────────────────────────────────
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder, colorize

; ── 라이브러리 ──────────────────────────────────────────
lib_deps =
    ; BNO085 센서 퓨전 라이브러리 (Adafruit 공식)
    adafruit/Adafruit BNO08x@^1.2.3
    adafruit/Adafruit BusIO@^1.14.0

    ; NVS (설정 영구 저장) - ESP-IDF 내장이라 별도 불필요
    ; ESP-NOW - ESP-IDF 내장

; ── 파티션 (NVS 공간 확보) ─────────────────────────────
board_build.partitions = partitions.csv

; ── 업로드 ─────────────────────────────────────────────
upload_speed = 921600

; ─── 개발 편의: 시리얼 모니터 자동 리셋 ───────────────
monitor_dtr = 0
monitor_rts = 0
